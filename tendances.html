<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tendances par source · Editorial Signal · The Black Room</title>
    <meta
      name="description"
      content="Sujets qui buzzent sur chaque support — Discover, Google News, Reddit, YouTube, Trends, X, Wikipedia, MSN"
    />
    <meta name="theme-color" content="#0A0B0F" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css?family=figtree:400,500,600,700,800|jetbrains-mono:400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/tokens.css?v=tbr5" />
    <link rel="stylesheet" href="styles/base.css?v=tbr5" />
    <link rel="stylesheet" href="styles/components.css?v=tbr11" />
    <link rel="stylesheet" href="styles/cockpit-pro.css?v=tbr1" />
    <link rel="stylesheet" href="styles/tokens-bridge.css?v=tbr1" />
    <link rel="stylesheet" href="styles/tendances-pro.css?v=tbr1" />
    <!-- Anti-FOUC : si pas de session valide, lock l'HTML avant le rendu -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("tbr-auth-session");
          var session = raw ? JSON.parse(raw) : null;
          if (!session || typeof session.expires !== "number" || Date.now() >= session.expires) {
            document.documentElement.classList.add("is-locked");
          }
        } catch (e) {
          document.documentElement.classList.add("is-locked");
        }
      })();
    </script>
  </head>
  <body>
    <!-- Auth modal (cosmetic gate) -->
    <div class="auth-gate" data-auth-root hidden>
      <div class="auth-gate__backdrop"></div>
      <div class="auth-gate__panel" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <div class="auth-gate__brand">
          <img class="auth-gate__brand-logo" src="assets/logo-tbr.svg" alt="" />
          <div class="auth-gate__brand-text">
            <span class="auth-gate__brand-product">Editorial Signal</span>
            <span class="auth-gate__brand-tag">The <em>Black</em> Room</span>
          </div>
        </div>
        <h1 class="auth-gate__title" id="auth-title">Accès restreint</h1>
        <form class="auth-gate__form" data-auth-form>
          <label class="auth-gate__field">
            <span class="auth-gate__label">Email</span>
            <input
              class="auth-gate__input"
              type="email"
              name="email"
              required
              autocomplete="email"
              placeholder="vous@theblackroom.io"
            />
          </label>
          <label class="auth-gate__field">
            <span class="auth-gate__label">Mot de passe</span>
            <input
              class="auth-gate__input"
              type="password"
              name="password"
              required
              autocomplete="current-password"
            />
          </label>
          <p class="auth-gate__error" data-auth-error hidden></p>
          <button class="btn btn--primary auth-gate__submit" type="submit">
            Accéder au briefing
          </button>
        </form>
      </div>
    </div>

    <!-- Shell rendu par scripts/shell-pro.js -->
    <div id="shell-mount" data-shell-active="sources" data-shell-search="false"></div>

    <!-- Contenu de la page rendu dynamiquement par scripts/tendances.js -->
    <div id="tp-root"></div>

    <script type="module" src="scripts/auth.js?v=tbr5"></script>
    <script type="module" src="scripts/shell-pro.js?v=tbr1"></script>
    <script type="module" src="scripts/tendances.js?v=tbr6"></script>
  </body>
</html>
