<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" role="img" aria-label="Editorial Signal — The Black Room">
  <title>Editorial Signal</title>
  <!-- 4 ascending signal bars : cool → warm → hot-2 → hot -->
  <rect x="5"  y="30" width="7" height="12" rx="2.4" fill="#5A6275"/>
  <rect x="16" y="23" width="7" height="19" rx="2.4" fill="#F5B14B"/>
  <rect x="27" y="15" width="7" height="27" rx="2.4" fill="#FF8A5B"/>
  <rect x="38" y="11" width="7" height="31" rx="2.4" fill="#FF6A4D"/>
  <!-- beacon : halo + dot -->
  <circle cx="41.5" cy="5.5" r="5"   fill="rgba(255,106,77,0.22)"/>
  <circle cx="41.5" cy="5.5" r="2.7" fill="#FF6A4D"/>
</svg>
