name: Fetch sources & score

# Un seul schedule unifié : toutes les 8 sources rafraîchies 4 fois par
# jour (00:30, 06:30, 12:30, 18:30 UTC). Couvre la matinale, le midi,
# le soir et la nuit — les fenêtres éditoriales canoniques.
#
# Choix produit : le user a explicitement demandé "tous les canaux
# d'information toutes les 6h" → un seul mode `full` régulier, pas de
# split light/full. Plus simple à maintenir, signal homogène entre les
# pages projet et le flux global.
#
# Workflow_dispatch reste dispo pour lancer à la main depuis l'UI
# GitHub (Actions > Fetch sources & score > Run workflow).
#
# Coût indicatif :
#   - SerpAPI (Google Trends) : 3 calls × 4 runs = 12 calls/jour
#     ≈ 360/mois. Vérifier que le plan couvre (free tier = 100/mois).
#   - Voyage / Anthropic : 0 (le scoring global n'appelle pas ces APIs).
#   - YouTube Data : 4 unités/jour (quota gratuit 10k/jour, large).

on:
  schedule:
    # 4 fois par jour à HH:30 UTC pour éviter la congestion top-of-hour
    - cron: "30 0,6,12,18 * * *"
  workflow_dispatch: {}

# Le job a besoin d'écrire des commits sur le repo.
permissions:
  contents: write

# Empêche deux runs simultanés de se marcher dessus.
concurrency:
  group: fetch-and-score
  cancel-in-progress: false

jobs:
  run:
    name: full-8-sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Suffisant pour git diff/commit
          fetch-depth: 1
          # Token implicite avec permissions:contents:write
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch all 8 sources
        env:
          MSN_API_KEY: ${{ secrets.MSN_API_KEY }}
          MSN_MARKET: fr-fr
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_GEO: FR
          WIKIMEDIA_USER_AGENT: ${{ secrets.WIKIMEDIA_USER_AGENT }}
          WIKIMEDIA_PROJECT: fr.wikipedia
          X_TRENDS_URL: https://trends24.in/france/
          DISCOVERSNOOP_EMAIL: ${{ secrets.DISCOVERSNOOP_EMAIL }}
          DISCOVERSNOOP_PASSWORD: ${{ secrets.DISCOVERSNOOP_PASSWORD }}
          DISCOVERSNOOP_COUNTRY: FR
          DISCOVERSNOOP_HOURS: 12
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_REGION: FR
          # TikTok via RapidAPI (tiktok-api23). Si absent, fetch tiktok
          # retourne 0 items + 1 failure missing_api_key, le pipeline
          # continue avec 7/8 sources.
          RAPIDAPI_TIKTOK_KEY: ${{ secrets.RAPIDAPI_TIKTOK_KEY }}
          # Reddit retire de fetch-all : reCAPTCHA bloque la creation
          # d'une script app OAuth, et le RSS public est blackliste sur
          # les IPs GitHub Actions. Code conserve dans server/sources/reddit.py
          # pour usage local : `python -m server.cli fetch reddit`.
        run: python -m server.cli fetch-all

      - name: Score
        env:
          # Voyage utilise par semantic_dedup (clustering des candidats
          # MSN par embeddings cosine > 0.78). Si absent, degrade en
          # no-op (pas de dedup) mais le pipeline continue.
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          VOYAGE_MODEL: voyage-3
        run: python -m server.cli score

      # PostgreSQL time-series : crée les tables si absent (idempotent)
      # puis insère un snapshot dans les 4 tables. Skip silencieux si
      # DATABASE_URL absent.
      - name: DB snapshot (time-series)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Skip : DATABASE_URL non défini (DB time-series désactivée)"
          else
            python -m server.cli db-init
            python -m server.cli db-snapshot
            python -m server.cli db-export
          fi

      # Enrichissement post-snapshot : LLM (entites, categories, sentiment,
      # ton) + velocity (delta score vs T-6h via BDD). Si ANTHROPIC_API_KEY
      # ou DATABASE_URL absents, l'enrichissement degrade gracieusement.
      - name: Enrich sujets (LLM + velocity)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m server.cli enrich

      # Re-génère les insights de chaque projet pour qu'ils restent
      # alignés sur les sujets du jour. Sans ça, les pages projet
      # affichent un briefing périmé entre deux runs gsc-daily.
      # Les insights réutilisent l'index Voyage existant (pas de re-embed),
      # donc temps cible : ~1-2 min/projet.
      - name: Regenerate project insights
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          VOYAGE_MODEL: voyage-3
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5
        run: |
          set -e
          for slug in parismatch futura-sciences; do
            # Skip si l'index Voyage n'existe pas (projet pas encore embed)
            if [ ! -f "data/projects/${slug}/embeddings.npz" ]; then
              echo "Skip ${slug} : pas d'index Voyage"
              continue
            fi
            echo "→ Insights ${slug}"
            python -m server.cli gsc-insights --project="${slug}" || echo "WARN: insights ${slug} failed (continue)"
          done

      - name: Commit & push snapshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # On ne stage que les données — jamais le code
          git add data/

          if git diff --staged --quiet; then
            echo "Pas de changement, rien à commit."
            exit 0
          fi

          TS="$(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "chore(data): snapshot full 8 sources — ${TS} [skip ci]"
          git push
